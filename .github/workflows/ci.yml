name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black mypy pytest
    
    - name: Lint with flake8
      run: |
        flake8 app.py voxplayer/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app.py voxplayer/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Check formatting with black
      run: |
        black --check app.py voxplayer/
    
    - name: Type check with mypy
      run: |
        mypy app.py voxplayer/ --ignore-missing-imports || true

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        python test.py || true
        pytest --version || echo "Pytest not configured yet"
    
    - name: Test imports
      run: |
        python -c "import sys; sys.path.insert(0, '.'); from app import VoxPlayerMainWindow, main; print('✓ Imports successful')"
    
    - name: Syntax check
      run: |
        python -m py_compile app.py
        python -m py_compile voxplayer/app.py

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build wheel
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check build artifacts
      run: |
        ls -la dist/ || echo "No dist directory"
