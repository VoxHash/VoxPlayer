name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black mypy pytest
    
    - name: Lint with flake8
      run: |
        flake8 app.py voxplayer/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app.py voxplayer/ --count --max-complexity=15 --max-line-length=120 --statistics
    
    - name: Check formatting with black
      run: |
        black --check app.py voxplayer/ || true
    
    - name: Type check with mypy
      run: |
        mypy app.py voxplayer/ --ignore-missing-imports || true

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Linux runtime dependencies for PyQt6
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1 \
          libegl1 \
          libxkbcommon-x11-0 \
          libpulse-mainloop-glib0
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python test.py || true
        pytest --version || echo "Pytest not configured yet"
    
    - name: Test imports
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        python -c "import sys; sys.path.insert(0, '.'); import os; os.environ['QT_QPA_PLATFORM'] = 'offscreen'; from app import VoxPlayerMainWindow, main; print('✓ Imports successful')" || python -c "import sys; sys.path.insert(0, '.'); import os; os.environ['QT_QPA_PLATFORM'] = 'offscreen'; from voxplayer.app import VoxPlayerMainWindow, main; print('✓ Imports successful')"
    
    - name: Syntax check
      run: |
        python -m py_compile app.py || echo "app.py not found, skipping"
        python -m py_compile voxplayer/app.py || echo "voxplayer/app.py not found, skipping"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build wheel
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check build artifacts
      run: |
        ls -la dist/ || echo "No dist directory"
